<!DOCTYPE html>
<html lang="es">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>My Postcard</title>

		<link rel="preconnect" href="https://fonts.googleapis.com" />
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
		<link href="https://fonts.googleapis.com/css2?family=Patrick+Hand&display=swap" rel="stylesheet" />

		<link rel="stylesheet" href="styles.css" />
	</head>
	<body>
		<div class="postcard">
			<div class="header">
				<h1>My Postcard</h1>
				<img src="https://assets.breatheco.de/apis/img/icon/4geeks.png" alt="4Geeks Logo" class="logo" />
			</div>

			<div class="body">
				<div class="left-column">
					<p>Look how awesome! This is a postcard that I created using HTML5 and CSS3 during my 4Geeks Academy Course!</p>
					<p>This is so cool, can't wait to start doing more stuff!</p>
				</div>

				<div class="right-column">
					<form action="#" method="POST">
						<input type="text" name="name" placeholder="Some Name" />
						<input type="email" name="email" placeholder="Some Email" />
						<input type="text" name="comment" placeholder="Some comment" />
					</form>
				</div>
			</div>

			<div class="footer">
				<button type="button">Send My Postcard</button>
			</div>
		</div>
	</body>
</html>
